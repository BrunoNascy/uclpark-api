services:
  db:
    image: mysql:8.4
    container_name: uclpark-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: uclpark_db
      MYSQL_USER: uclpark
      MYSQL_PASSWORD: uclpark123
    ports:
      - "3306:3306"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: uclpark-api
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
