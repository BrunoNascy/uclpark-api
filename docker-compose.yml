services:
  db:
    image: mysql:8.4
    container_name: uclpark-db
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uclpark-network

  api:
    build: .
    container_name: uclpark-api
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - uclpark-network

networks:
  uclpark-network:
    driver: bridge

volumes:
  db_data:
